name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*' # Trigger when user pushes a version tag (e.g. v1.0.0)
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 653878654192-caadlri7dgucsvp2ru1c9klfs7d9202c.apps.googleusercontent.com

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''
          accept-android-sdk-licenses: false

      - name: Accept Android SDK Licenses Manually
        run: |
          for sdk in /usr/local/lib/android/sdk/cmdline-tools/*/bin/sdkmanager; do
            if [ -x "$sdk" ]; then
              echo "Accepting licenses for $sdk"
              yes | "$sdk" --licenses || true
            fi
          done

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Native Android Directory
        run: pnpm expo prebuild --platform android

      - name: Optimize Gradle Properties (arm64-v8a)
        run: |
          sed -i 's/reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a/g' android/gradle.properties

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: financy-arm64-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
